# 结构化搜索模板 — 替代 LLM Agent 搜索决策
# 每个模板包含 query_family/intended_section/intended_category/language metadata
# ContinuousIngester 每小时遍历所有模板执行搜索
#
# 字段说明：
#   query: 搜索关键词
#   language: zh/en
#   section: industry/policy/academic
#   category: 高材制造/清洁能源/AI
#   query_family: 查询类别（用于诊断和分析）
#   freshness: 时效性 oneDay/oneWeek/oneMonth（默认 oneWeek）
#   include_domains: 限定域名（可选）
#   exclude_domains: 排除域名（可选）

