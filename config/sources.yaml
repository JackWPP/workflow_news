# 信源注册表 — 统一管理 RSS/API/Listing/Search 信源
# 修改此文件不需要重启应用（下次日报生成时自动加载）
#
# 字段说明：
#   id: 唯一标识（用于日志和诊断）
#   name: 显示名称
#   domain: 域名（用于去重和黑名单）
#   kind: 信源类型 rss/api/listing/search
#   tier: 信源等级 S/A/B/C/D/Watch-only
#   sections: 可入选的日报板块 [industry, policy, academic]
#   categories: 可入选的方向 [高材制造, 清洁能源, AI]
#   language: 主要语言 zh/en
#   country: 国家/地区代码
#   priority: 优先级（越高越优先）
#   enabled: 是否启用
#   allow_images: 是否允许提取图片
#   lead_allowed: 是否允许作为日报主条目
#   quota_per_day: 每日最大入选数
#   rss_url: RSS/Atom feed URL（kind=rss 时必填）
#   crawl_mode: 爬取模式 rss/listing/search
#   use_direct_source: 是否使用直接源（非聚合）
#   include_any: 正向关键词（至少命中一个才收录）
#   exclude_any: 负向关键词（命中任意则排除）
#   soft_signals: 软信号（用于评分，不强制）

# ============================================================================
# S/A 级：政府、标准、期刊、大学/实验室、企业 newsroom
# ============================================================================

