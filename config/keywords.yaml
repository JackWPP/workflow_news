# 高分子材料加工领域关键词配置
# 修改此文件不需要重启应用（下次日报生成时自动加载）
#
# 来源：提取自 app/services/daily_report_agent.py (_POSITIVE_KEYWORDS, _NEGATIVE_KEYWORDS,
#   _SECTION_HINT_KEYWORDS, _NON_ARTICLE_URL_PATTERNS, _NON_ARTICLE_DOMAIN_SUFFIXES)
#  和 app/services/harness.py (DEFAULT_DOMAIN_KEYWORDS, DEFAULT_BLOCKED_DOMAINS)

# ============================================================================
# 正向关键词：内容必须与至少一个关键词相关
# ============================================================================
positive_keywords:
  zh:
    - 高分子
    - 塑料
    - 橡胶
    - 复合材料
    - 树脂
    - 改性
    - 薄膜
    - 包装
    - 注塑
    - 挤出
    - 吹塑
    - 成型
    - 回收
    - 再生
    - 生物基
    - 降解
  en:
    - polymer
    - plastic
    - plastics
    - rubber
    - composite
    - resin
    - recycling
    - biodegradable
    - processing
    - injection
    - injection molding
    - extrusion
    - additive manufacturing

# ============================================================================
# 负向关键词：命中任何一条则排除
# ============================================================================
